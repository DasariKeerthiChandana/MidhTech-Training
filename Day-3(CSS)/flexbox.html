<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>flexbox</title>
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh; 
background:pink;
}
.box{
width:900px;
height:250px;
background:skyblue;
border:3px solid black;
display:flex;
border-radius:10px;
justify-content:center;
align-items:center;
gap:20px;
}
.card{
width:180px;
height:180px;
background:white;
color:blue;
border-radius:10px;
border:2px solid black;
flex-shrink: 0;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;

</style>
</head>
<body>
<div class="box">
<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">JAVASCRIPT</div>
<div class="card">REACT</div>
</div>
</body>
</html>
